name: plant_it_helper
description: "PlantIt Helper - AI Plant Care App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  http_parser: ^4.0.2              # MediaType for explicit multipart content-type on image upload
  flutter_secure_storage: ^9.2.2
  image_picker: ^1.1.2          # camera + gallery access (wraps iOS UIImagePickerController / Android Intent)
  flutter_image_compress: ^2.3.0 # compresses image bytes in native code before upload

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
